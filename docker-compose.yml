name: blue-heritage-app
services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_GA4_ID: ${NEXT_PUBLIC_GA4_ID:-}
        NEXT_PUBLIC_META_PIXEL_ID: ${NEXT_PUBLIC_META_PIXEL_ID:-}
    restart: unless-stopped
    env_file: .env
    depends_on:
      - db
    networks:
      - internal
      - proxy
    volumes:
      - uploads:/app/public/uploads
    mem_limit: 1g
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.heritage.rule=Host(`blueheritageenim.com`) || Host(`www.blueheritageenim.com`)"
      - "traefik.http.routers.heritage.entrypoints=websecure"
      - "traefik.http.routers.heritage.tls.certresolver=le"
      - "traefik.http.routers.heritage.middlewares=heritage-www-redirect"
      - "traefik.http.services.heritage.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.heritage-www-redirect.redirectregex.regex=^https://www\\.blueheritageenim\\.com/(.*)"
      - "traefik.http.middlewares.heritage-www-redirect.redirectregex.replacement=https://blueheritageenim.com/$${1}"
      - "traefik.http.middlewares.heritage-www-redirect.redirectregex.permanent=true"
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: heritage
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: heritage
    networks:
      - internal
    volumes:
      - pgdata:/var/lib/postgresql/data
    mem_limit: 1g

networks:
  internal:
  proxy:
    external: true

volumes:
  pgdata:
  uploads:
