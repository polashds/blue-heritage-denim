name: blue-heritage
services:
  blue-heritage:
    container_name: blue-heritage-app
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
        NEXT_PUBLIC_GA4_ID: ${NEXT_PUBLIC_GA4_ID:-}
        NEXT_PUBLIC_META_PIXEL_ID: ${NEXT_PUBLIC_META_PIXEL_ID:-}
    restart: unless-stopped
    env_file: .env
    depends_on:
      - db
    networks:
      - internal
      - proxy
    volumes:
      - uploads:/app/public/uploads
    mem_limit: 1g
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.blueheritage.rule=Host(`${SITE_DOMAIN}`)"
      - "traefik.http.routers.blueheritage.entrypoints=websecure"
      - "traefik.http.routers.blueheritage.tls.certresolver=le"
      - "traefik.http.services.blueheritage.loadbalancer.server.port=3000"
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: heritage
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: heritage
    networks:
      - internal
    volumes:
      - pgdata:/var/lib/postgresql/data
    mem_limit: 1g

networks:
  internal:
  proxy:
    external: true

volumes:
  pgdata:
  uploads:
